<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Skillstest</title>
    <py-config>
        packages=['numpy','matplotlib']
        
    </py-config>
</head>
<body>
    <header>
    <div class="logo">10-Ruby</div>
    <nav>
        <a onclick="showPage('gallery')">Gallery</a>
        <a onclick="showPage('classmates')">Classmates</a>
        <a onclick="showPage('attendance')">Attendance</a>
    </nav>
</header>

<!-- 📸 GALLERY -->
<section id="gallery" class="active">
    <h2>Gallery</h2>
    <p>Put your photos here</p>
</section>

<!-- 👥 CLASSMATES -->
<section id="classmates">

    <div class="container">
        <h2>Classmates System</h2>

        <input type="text" id="name" placeholder="Name"><br>
        <input type="text" id="section" placeholder="Section"><br>
        <input type="text" id="subject" placeholder="Favorite Subject"><br>

        <button class="add-btn" py-click="add_classmate">Add</button>
        <button class="show-btn" py-click="show_list">Show</button>
    </div>

    <div id="output"></div>

</section>
    
    <div class="card">
    <h2>Attendance Tracker</h2>

    <label>Select Day</label>
    <select id="day">
      <option>Mon</option>
      <option>Tue</option>
      <option>Wed</option>
      <option>Thu</option>
      <option>Fri</option>
    </select>

    <label>Absences</label>
    <input type="number" id="absences" value="0">

    <button py-click="update_graph">Submit</button>
    </div>

    <div class="graph">
      <div id="plot"></div>
    </div>
  
    <div id='output'></div>
    <py-script src="main.py"></py-script>
</body>
</html>
